[tox]
envlist = py311
isolated_build = True

[testenv]
deps =
    pytest>=8.0.0
    pytest-asyncio>=0.23.0
    pytest-cov>=4.1.0
commands =
    pytest tests/ -v --cov=src/agento --cov-fail-under=95 {posargs}

[testenv:lint]
deps =
    ruff>=0.3.0
    black>=24.0.0
    mypy>=1.9.0
commands =
    ruff check src/agento
    black --check src/agento
    mypy src/agento
