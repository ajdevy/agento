name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python 3.14)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'

      - name: Create virtual environment
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip

      - name: Install dependencies
        run: |
          .venv/bin/pip install -e ".[dev]"

      - name: Lint
        run: |
          .venv/bin/ruff check src/agento tests/

      - name: Format check
        run: |
          .venv/bin/ruff format --check src/agento tests/

      - name: Run tests
        run: |
          .venv/bin/pytest tests/ -v --cov=src/agento --cov-report=xml --cov-fail-under=95

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  lint:
    name: Lint only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install ruff && ruff check src/agento tests/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m venv .venv && .venv/bin/pip install build && python -m build